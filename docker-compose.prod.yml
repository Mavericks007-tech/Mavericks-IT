# Prod compose — gunicorn, Next standalone, nginx reverse proxy, healthchecks.
# Usage: docker compose -f docker-compose.prod.yml --env-file .env up -d --build
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      TZ: Asia/Dhaka
      PGTZ: Asia/Dhaka
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      ENVIRONMENT: production
      DEBUG: "False"
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
      - ./backups:/app/backups
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn backend_config.wsgi:application
               --bind 0.0.0.0:8000
               --workers ${GUNICORN_WORKERS:-3}
               --threads 2
               --timeout 60
               --access-logfile -
               --error-logfile -"

  celery_worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      ENVIRONMENT: production
      DEBUG: "False"
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - media_data:/app/media
      - ./backups:/app/backups
    depends_on: [backend, redis]
    command: celery -A backend_config worker -l info --concurrency=4

  celery_beat:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      ENVIRONMENT: production
      DEBUG: "False"
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on: [backend, redis]
    command: celery -A backend_config beat -l info

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      TZ: Asia/Dhaka
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    depends_on: [backend]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/sites/maverickstech.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
      - ./infra/certbot/conf:/etc/letsencrypt:ro
      - ./infra/certbot/www:/var/www/certbot:ro
    depends_on: [backend, frontend]

volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:
