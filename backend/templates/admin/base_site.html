{% extends "admin/base_site.html" %}

{% block userlinks %}
    {% if user.is_active and user.is_staff %}
        {% if user.is_superuser %}
            <a href="{% url 'admin:password_change' %}">Change password</a>
        {% endif %}
        /
        <form id="logout-form" method="post" action="{% url 'admin:logout' %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit" style="background:none;border:none;color:inherit;cursor:pointer;padding:0;font:inherit;text-decoration:underline;">Log out</button>
        </form>
    {% endif %}
{% endblock %}
