[tool.ruff]
line-length = 120
target-version = "py312"
extend-exclude = ["migrations", "venv", ".venv", "staticfiles", "media"]

[tool.ruff.lint]
select = [
    "E", "F", "W",  # pycodestyle / pyflakes
    "I",            # isort
    "B",            # bugbear
    "UP",           # pyupgrade
    "DJ",           # django-specific
    "S",            # bandit (security)
    "RUF",          # ruff-specific
]
ignore = [
    "E501",   # line too long — handled by formatter
    "S101",   # assert allowed (used in tests)
    "S105",   # hardcoded password — false positives on default fields
    "S106",
    "S107",
    "DJ001",  # null=True on CharField — common pattern here
    "B008",   # function call in default arg (Django F() etc.)
]

[tool.ruff.lint.per-file-ignores]
"*/tests/*.py"    = ["S106", "S311", "S324"]
"*/migrations/*"  = ["E", "F", "I"]
"conftest.py"     = ["S106"]

[tool.ruff.lint.isort]
known-first-party = ["cms", "core", "crm", "comms", "portal", "rbac", "reports", "seo", "site_content", "accounts", "backend_config"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "backend_config.settings"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
addopts = "--reuse-db --no-migrations -q"
testpaths = ["tests", "cms", "crm", "portal", "comms", "reports", "seo", "site_content"]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["cms", "core", "crm", "comms", "portal", "rbac", "reports", "seo", "site_content", "accounts"]
omit = ["*/migrations/*", "*/tests/*", "*/management/*", "*/__init__.py"]
branch = true

[tool.coverage.report]
fail_under = 60
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]
