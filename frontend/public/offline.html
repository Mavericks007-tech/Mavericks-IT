<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Offline — Mavericks Tech Bangladesh</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: #0A0A0F; color: #fff;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    main { text-align: center; padding: 2rem; max-width: 440px; }
    h1 { font-size: 1.75rem; margin: 0 0 0.5rem; }
    p  { color: #94A3B8; line-height: 1.5; }
    a {
      display: inline-block; margin-top: 1.5rem; padding: 0.75rem 1.5rem;
      background: #00D9FF; color: #0A0A0F; border-radius: 8px;
      text-decoration: none; font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>You're offline</h1>
    <p>This page isn't available without a connection. Reconnect and reload.</p>
    <a href="/">Retry</a>
  </main>
</body>
</html>
